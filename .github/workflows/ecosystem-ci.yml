name: Ecosystem CI

# Cross-repo CI for the Connect ecosystem. For each product this clones the
# CANONICAL GitHub repository at the exact commit pinned in
# manifest/ecosystem.yaml (the ecosystem lockfile), runs that product's own
# offline gate, and -- once every product gate has passed -- runs
# scripts/check_manifest.py to confirm README.md / COMPATIBILITY.md have not
# drifted from the manifest. A stale doc table fails this workflow exactly
# like a broken sibling test would.
#
# NOTE: this workflow was authored and YAML-validated (python3 -c "import
# yaml; yaml.safe_load(...)") in the environment that wrote it, but has not
# actually been executed by GitHub Actions. It requires the sibling
# repositories (AgentConnect, BrainConnect, ComputeConnect, ToolConnect) to
# be public and clonable by the token this workflow runs with -- if any of
# them go private, this workflow needs a PAT with cross-repo read access
# configured as a secret instead of the default GITHUB_TOKEN.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  agentconnect:
    name: agentconnect gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Connect (for the manifest + check scripts)
        uses: actions/checkout@v4
        with:
          path: Connect

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pinned commit from manifest
        id: pin
        working-directory: Connect
        run: |
          COMMIT=$(PYTHONPATH=scripts python3 -c "import _manifest_yaml as my; m = my.load(open('manifest/ecosystem.yaml').read()); print(m['products']['agentconnect']['commit'])")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Checkout AgentConnect at pinned commit
        uses: actions/checkout@v4
        with:
          repository: Judgernaut777/AgentConnect
          ref: ${{ steps.pin.outputs.commit }}
          path: mcp-agentconnect

      - name: Install the nine packages (editable) + test deps
        working-directory: mcp-agentconnect
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/agentconnect-core \
                      -e packages/agentconnect-api \
                      -e packages/agentconnect-cli \
                      -e packages/agentconnect-router \
                      -e packages/agentconnect-model-manager \
                      -e packages/agentconnect-runtime \
                      -e packages/agentconnect-mcp \
                      -e packages/agentconnect-linear \
                      -e packages/agentconnect-temporal
          pip install pytest

      - name: Run offline gate
        working-directory: mcp-agentconnect
        run: pytest -q

  brainconnect:
    name: brainconnect gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Connect (for the manifest)
        uses: actions/checkout@v4
        with:
          path: Connect

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pinned commit from manifest
        id: pin
        working-directory: Connect
        run: |
          COMMIT=$(PYTHONPATH=scripts python3 -c "import _manifest_yaml as my; m = my.load(open('manifest/ecosystem.yaml').read()); print(m['products']['brainconnect']['commit'])")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Checkout BrainConnect at pinned commit
        uses: actions/checkout@v4
        with:
          repository: Judgernaut777/BrainConnect
          ref: ${{ steps.pin.outputs.commit }}
          path: WikiBrain

      - name: Install core CLI (no optional extras)
        working-directory: WikiBrain
        run: pip install .

      - name: Entry-point smoke
        working-directory: WikiBrain
        run: |
          brainconnect --help
          brainconnect-librarian --help

      - name: Run acceptance suite
        # Pure Python, offline, temp DB per check. Deliberately does NOT
        # export a global BRAINCONNECT_DB here -- that breaks the suite's
        # own per-check isolation.
        working-directory: WikiBrain
        run: python3 tests/acceptance.py

  computeconnect:
    name: computeconnect gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Connect (for the manifest)
        uses: actions/checkout@v4
        with:
          path: Connect

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pinned commit from manifest
        id: pin
        working-directory: Connect
        run: |
          COMMIT=$(PYTHONPATH=scripts python3 -c "import _manifest_yaml as my; m = my.load(open('manifest/ecosystem.yaml').read()); print(m['products']['computeconnect']['commit'])")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Checkout ComputeConnect at pinned commit
        uses: actions/checkout@v4
        with:
          repository: Judgernaut777/ComputeConnect
          ref: ${{ steps.pin.outputs.commit }}
          path: ComputeConnect

      - name: Install computeconnect (editable) + test deps
        working-directory: ComputeConnect
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,config]

      - name: Run offline gate
        # Real-engine tests need a live llama.cpp on :8080 (and a second on
        # :8091 for heterogeneous-placement tests); no such engine exists in
        # a hosted runner, so they're excluded explicitly rather than relying
        # on their own runtime skip.
        working-directory: ComputeConnect
        run: python -m pytest -o addopts="" -q --ignore=tests/test_real_engine.py

  toolconnect:
    name: toolconnect gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Connect (for the manifest)
        uses: actions/checkout@v4
        with:
          path: Connect

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pinned commit from manifest
        id: pin
        working-directory: Connect
        run: |
          COMMIT=$(PYTHONPATH=scripts python3 -c "import _manifest_yaml as my; m = my.load(open('manifest/ecosystem.yaml').read()); print(m['products']['toolconnect']['commit'])")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Checkout ToolConnect at pinned commit
        uses: actions/checkout@v4
        with:
          repository: Judgernaut777/ToolConnect
          ref: ${{ steps.pin.outputs.commit }}
          path: ToolConnect

      - name: Install package with test extras
        working-directory: ToolConnect
        run: pip install -e ".[dev]"

      - name: Entry-point smoke
        working-directory: ToolConnect
        run: toolconnect --help

      - name: Run test suite
        working-directory: ToolConnect
        run: python -m pytest -q

  check-manifest:
    name: verify docs match the manifest
    runs-on: ubuntu-latest
    needs: [agentconnect, brainconnect, computeconnect, toolconnect]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check README.md / COMPATIBILITY.md against manifest/ecosystem.yaml
        run: python3 scripts/check_manifest.py
